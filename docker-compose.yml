services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nfp-tracker
    ports:
      - "${HOST_PORT:-3000}:${PORT:-3000}"
    environment:
      PORT: "${PORT:-3000}"
      SQLITE_FILE_PATH: /var/lib/nfp/nfp.db
      SESSION_TTL_HOURS: "720"
    volumes:
      - nfp_data:/var/lib/nfp
    restart: unless-stopped

volumes:
  nfp_data:
